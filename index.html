<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="src/assets/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#8b5cf6" />
    <meta name="description" content="桃園機場 D11-D18 登機門航班即時資訊與統計分析" />
    <title>桃園機場 D11-D18 航班資料</title>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- iOS PWA 支援 -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="航班資料" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    
    <script>
      // 不可使用 import.meta（非 type="module" 腳本）；改由路徑判斷
      window.__BASE_PATH__ =
        typeof location !== 'undefined' && location.pathname.indexOf('/Brainless') === 0
          ? '/Brainless'
          : '';
      window.__APP_VERSION__ = '{{APP_VERSION}}';
    </script>
    
    <!-- Studio theme: Plus Jakarta Sans (applied when data-app-theme=studio on html) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <!-- YouTube IFrame API -->
    <script src="https://www.youtube.com/iframe_api"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    
    <!-- Service Worker 註冊 -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          // 根據環境決定 Service Worker 路徑
          // 開發環境：使用 /sw.js
          // 生產環境：使用 /Brainless/sw.js
          var isProduction = window.location.pathname.indexOf('/Brainless') === 0
          var swPath = isProduction ? '/Brainless/sw.js' : '/sw.js'
          
          // 在開發環境中，Service Worker 可能無法正常工作（需要 HTTPS）
          // 所以只在生產環境或明確需要時註冊
          if (isProduction || window.location.protocol === 'https:' || window.location.hostname === 'localhost') {
            navigator.serviceWorker.register(swPath)
            .then((registration) => {
              // 監聽 Service Worker 的更新消息
              navigator.serviceWorker.addEventListener('message', (event) => {
                if (event.data && event.data.type === 'SW_UPDATE') {
                  const newVersion = event.data.version
                  const currentVersion = window.__APP_VERSION__ || 'unknown'
                  
                  // 強制重新載入頁面（確保 iOS Safari 更新）
                  if (newVersion !== currentVersion) {
                    // 清除所有快取
                    if ('caches' in window) {
                      caches.keys().then((names) => {
                        names.forEach((name) => caches.delete(name))
                      })
                    }
                    // 強制重新載入
                    window.location.reload(true)
                  }
                }
              })
              
              // 檢查更新
              registration.addEventListener('updatefound', () => {
                const newWorker = registration.installing
                newWorker.addEventListener('statechange', () => {
                  if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                    // 強制重新載入（特別是 iOS Safari）
                    window.location.reload(true)
                  }
                })
              })
              
              // 定期檢查更新（每 5 分鐘）
              setInterval(() => {
                registration.update()
              }, 5 * 60 * 1000)
            })
            .catch(function () { /* SW 註冊失敗時靜音，避免控制台洗版 */ })
        })
      }
    </script>
  </body>
</html>
